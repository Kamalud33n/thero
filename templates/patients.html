<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patients - RehabAI</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .empty-state {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 60px 20px;
            color: var(--text-secondary);
            text-align: center;
        }
        .empty-state i   { color: var(--text-light); margin-bottom: 8px; }
        .empty-state h3  { font-size: 18px; font-weight: 600; color: var(--text-primary); }
        .empty-state p   { font-size: 14px; }

        .patients-summary {
            padding: 8px 16px;
            margin-bottom: 16px;
            font-size: 13px;
            color: var(--text-secondary);
            background: rgba(76,175,80,0.06);
            border-radius: 8px;
        }

        .patient-therapist {
            font-size: 12px;
            color: var(--text-secondary);
            margin: 6px 0 10px;
        }

        .metric-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        /* smooth card fade-out on delete */
        .patient-card {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .patient-card.removing {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="app-container">

    <!-- Sidebar -->
    <aside class="sidebar glass-effect">
        <div class="sidebar-header">
            <div class="logo-container">
                <img class="logo-icon" src="/assets/logo.png?v=2" alt="MedNova logo" width="44" height="44">
                <div class="logo-text">
                    <span class="logo-title">MedNova</span>
                    <span class="logo-subtitle">Therapy System</span>
                </div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="/dashboard" class="nav-item"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
            <a href="/patients"  class="nav-item active"><i class="fas fa-users"></i><span>Patients</span></a>
            <a href="/session"   class="nav-item"><i class="fas fa-video"></i><span>Start Session</span></a>
            <a href="/reports"   class="nav-item"><i class="fas fa-file-alt"></i><span>Reports</span></a>
            <a href="/analytics" class="nav-item"><i class="fas fa-chart-line"></i><span>Analysis</span></a>
            <a href="#"          class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="status-indicator">
                <span class="status-dot" id="systemDot"></span>
                <span class="status-text" id="systemStatusText">Checking...</span>
            </div>
            <div class="version-info">v2.0.0</div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Bar -->
        <header class="top-bar glass-effect">
            <div class="top-bar-left">
                <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                <div class="breadcrumb">
                    <span>Home</span>
                    <i class="fas fa-chevron-right"></i>
                    <span class="active">Patients</span>
                </div>
            </div>
            <div class="top-bar-right">
                <div class="status-badge">
                    <span class="badge-dot" id="aiBadgeDot"></span>
                    <span id="aiStatusText">Checking...</span>
                </div>
                <div class="camera-status">
                    <i class="fas fa-camera"></i>
                    <span id="cameraStatusText">Disconnected</span>
                </div>
                <button class="logout-btn" onclick="handleLogout()">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <!-- Patients Content -->
        <div class="content-area">
            <div class="patients-header">
                <div class="header-left">
                    <h2>Patient Management</h2>
                    <p class="header-subtitle">Manage and monitor all patients</p>
                </div>
                <div class="header-right">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="patientSearch" placeholder="Search patients...">
                    </div>
                    <button class="btn-primary" onclick="openAddPatientModal()">
                        <i class="fas fa-plus"></i> Add Patient
                    </button>
                </div>
            </div>

            <!-- Summary bar -->
            <div class="patients-summary" id="patientsSummary" style="display:none">
                <span id="summaryText"></span>
            </div>

            <!-- Patients Grid -->
            <div class="patients-grid" id="patientsGrid">
                <div class="loading-placeholder">
                    <i class="fas fa-spinner fa-spin"></i> Loading patients...
                </div>
            </div>
        </div>
    </main>
</div>

<!-- ─── Add / Edit Patient Modal ─────────────────────────────────────── -->
<div class="modal" id="patientModal">
    <div class="modal-content glass-effect">
        <div class="modal-header">
            <h3 id="modalTitle">Add New Patient</h3>
            <button class="modal-close" onclick="closePatientModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <form id="patientForm" enctype="multipart/form-data">
            <input type="hidden" id="patientId" name="patient_id">

            <div class="form-row">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="patientName" name="name" required class="form-input">
                </div>
                <div class="form-group">
                    <label>Age *</label>
                    <input type="number" id="patientAge" name="age" required min="1" max="120" class="form-input">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Gender *</label>
                    <select id="patientGender" name="gender" required class="form-input">
                        <option value="">Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Weight (kg)</label>
                    <input type="number" id="patientWeight" name="weight" step="0.1" class="form-input">
                </div>
                <div class="form-group">
                    <label>Height (cm)</label>
                    <input type="number" id="patientHeight" name="height" step="0.1" class="form-input">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Diagnosis</label>
                    <input type="text" id="patientDiagnosis" name="diagnosis" class="form-input">
                </div>
                <div class="form-group">
                    <label>Affected Body Part</label>
                    <input type="text" id="patientAffectedPart" name="affected_body_part" class="form-input">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Doctor Name</label>
                    <input type="text" id="patientDoctor" name="doctor_name" class="form-input">
                </div>
                <div class="form-group">
                    <label>Therapist Name</label>
                    <input type="text" id="patientTherapist" name="therapist_name" class="form-input">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="patientPhone" name="phone" class="form-input">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="patientEmail" name="email" class="form-input">
                </div>
            </div>
            <div class="form-group">
                <label>Medical History</label>
                <textarea id="patientMedicalHistory" name="medical_history" class="form-input" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label>Previous Injury</label>
                <textarea id="patientPrevInjury" name="previous_injury" class="form-input" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label>Current Treatment</label>
                <textarea id="patientCurrTreatment" name="current_treatment" class="form-input" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label>Exercise Plan</label>
                <textarea id="patientExercisePlan" name="exercise_plan" class="form-input" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label>Photo</label>
                <input type="file" id="patientPhoto" name="photo" accept="image/*" class="form-input">
                <div id="photoPreview" style="margin-top:8px"></div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="closePatientModal()">Cancel</button>
                <button type="submit" class="btn-primary" id="saveBtn">
                    <i class="fas fa-save"></i> Save Patient
                </button>
            </div>
        </form>
    </div>
</div>

<!-- ─── View Patient Modal ────────────────────────────────────────────── -->
<div class="modal" id="viewPatientModal">
    <div class="modal-content glass-effect" style="max-width:720px">
        <div class="modal-header">
            <h3>Patient Details</h3>
            <button class="modal-close" onclick="closeViewPatientModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div id="patientDetails">
            <div class="loading-placeholder"><i class="fas fa-spinner fa-spin"></i></div>
        </div>
    </div>
</div>

<script src="/static/app.js"></script>
<script>
// ─── State ────────────────────────────────────────────────────────────────
let currentEditId = null;
let searchTimer   = null;

// ─── Boot ─────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('menuToggle')?.addEventListener('click', () =>
        document.querySelector('.sidebar').classList.toggle('active'));

    // Debounced search
    document.getElementById('patientSearch').addEventListener('input', e => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => loadPatients(e.target.value.trim()), 350);
    });

    // Photo preview
    document.getElementById('patientPhoto').addEventListener('change', function() {
        const prev = document.getElementById('photoPreview');
        prev.innerHTML = this.files[0]
            ? `<img src="${URL.createObjectURL(this.files[0])}"
                    style="width:80px;height:80px;border-radius:50%;object-fit:cover">`
            : '';
    });

    // Close modals on backdrop click
    document.querySelectorAll('.modal').forEach(m =>
        m.addEventListener('click', e => { if (e.target === m) m.classList.remove('active'); })
    );

    // Escape key
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape')
            document.querySelectorAll('.modal.active').forEach(m => m.classList.remove('active'));
    });

    checkHealth();
    loadPatients();
});

// ─── Health check ─────────────────────────────────────────────────────────
async function checkHealth() {
    try {
        const d  = await (await fetch('/api/health')).json();
        const ok = d.status === 'healthy';
        document.getElementById('systemDot').className          = 'status-dot ' + (ok ? 'online' : 'offline');
        document.getElementById('systemStatusText').textContent = ok ? 'System Online' : 'System Error';
        document.getElementById('cameraStatusText').textContent = d.camera_running   ? 'Connected'  : 'Disconnected';
        document.getElementById('aiBadgeDot').style.background  = d.mediapipe_ready  ? '#4CAF50'    : '#f44336';
        document.getElementById('aiStatusText').textContent      = d.mediapipe_ready  ? 'AI Ready'   : 'AI Offline';
    } catch {
        document.getElementById('systemStatusText').textContent = 'Offline';
    }
}

// ─── Load patients ────────────────────────────────────────────────────────
async function loadPatients(search = '') {
    const grid = document.getElementById('patientsGrid');
    grid.innerHTML = '<div class="loading-placeholder"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';

    try {
        const url      = search ? `/api/patients?search=${encodeURIComponent(search)}` : '/api/patients';
        const patients = await (await fetch(url)).json();

        // Summary bar
        const summary = document.getElementById('patientsSummary');
        if (patients.length) {
            const active = patients.filter(p => p.is_active).length;
            document.getElementById('summaryText').textContent =
                `${patients.length} patient${patients.length !== 1 ? 's' : ''} found · ${active} active`;
            summary.style.display = 'block';
        } else {
            summary.style.display = 'none';
        }

        if (!patients.length) {
            grid.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-users fa-3x"></i>
                    <h3>${search ? `No results for "${search}"` : 'No Patients Yet'}</h3>
                    <p>${search ? 'Try a different search term' : 'Add your first patient to get started'}</p>
                    ${!search ? `<button class="btn-primary" onclick="openAddPatientModal()">
                        <i class="fas fa-plus"></i> Add Patient</button>` : ''}
                </div>`;
            return;
        }

        grid.innerHTML = patients.map(p => {
            const accColor = p.avg_accuracy >= 80 ? '#4CAF50' : p.avg_accuracy >= 60 ? '#FF9800' : '#f44336';
            return `
            <div class="patient-card glass-effect animate-slide-up"
                 data-patient-id="${p.id}">
                <div class="patient-card-header">
                    <div class="patient-avatar">
                        ${p.photo
                            ? `<img src="data:image/jpeg;base64,${p.photo}" alt="${p.name}">`
                            : `<span>${p.name.charAt(0).toUpperCase()}</span>`}
                    </div>
                    <div class="patient-status">
                        <span class="status-badge ${p.is_active ? 'active' : 'inactive'}">
                            ${p.is_active ? 'Active' : 'Inactive'}
                        </span>
                    </div>
                </div>
                <div class="patient-card-body">
                    <h4 class="patient-name">${p.name}</h4>
                    <div class="patient-meta">
                        <span><i class="fas fa-user"></i> ${p.age} yrs</span>
                        <span><i class="fas fa-venus-mars"></i> ${p.gender}</span>
                        <span><i class="fas fa-stethoscope"></i> ${p.diagnosis || '—'}</span>
                    </div>
                    <div class="patient-stats">
                        <div class="patient-stat">
                            <span class="stat-number">${p.sessions_count ?? 0}</span>
                            <span class="stat-label">Sessions</span>
                        </div>
                        <div class="patient-stat">
                            <span class="stat-number" style="color:${accColor}">${p.avg_accuracy ?? 0}%</span>
                            <span class="stat-label">Accuracy</span>
                        </div>
                    </div>
                    ${p.therapist_name
                        ? `<div class="patient-therapist">
                               <i class="fas fa-user-md"></i> ${p.therapist_name}
                           </div>` : ''}
                    <div class="patient-actions">
                        <button class="btn-icon" onclick="viewPatient('${p.id}')" title="View">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="btn-icon" onclick="editPatient('${p.id}')" title="Edit">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn-icon danger"
                                onclick="deletePatient('${p.id}', '${p.name.replace(/'/g, "\\'")}')">
                            <i class="fas fa-trash"></i>
                        </button>
                        <button class="btn-icon"
                                onclick="generateReport('${p.id}', '${p.name.replace(/'/g, "\\'")}')">
                            <i class="fas fa-file-pdf"></i>
                        </button>
                    </div>
                </div>
            </div>`;
        }).join('');

    } catch(e) {
        console.error('loadPatients:', e);
        grid.innerHTML = '<p style="color:red;padding:1rem">Failed to load patients.</p>';
    }
}

// ─── Add modal ────────────────────────────────────────────────────────────
function openAddPatientModal() {
    currentEditId = null;
    document.getElementById('modalTitle').textContent = 'Add New Patient';
    document.getElementById('patientForm').reset();
    document.getElementById('patientId').value    = '';
    document.getElementById('photoPreview').innerHTML = '';
    document.getElementById('patientModal').classList.add('active');
}

function closePatientModal() {
    document.getElementById('patientModal').classList.remove('active');
}

// ─── Edit ─────────────────────────────────────────────────────────────────
async function editPatient(pid) {
    try {
        const p = await (await fetch(`/api/patients/${pid}`)).json();
        currentEditId = pid;
        document.getElementById('modalTitle').textContent          = 'Edit Patient';
        document.getElementById('patientId').value                 = pid;
        document.getElementById('patientName').value               = p.name               ?? '';
        document.getElementById('patientAge').value                = p.age                ?? '';
        document.getElementById('patientGender').value             = p.gender             ?? '';
        document.getElementById('patientWeight').value             = p.weight             ?? '';
        document.getElementById('patientHeight').value             = p.height             ?? '';
        document.getElementById('patientDiagnosis').value          = p.diagnosis          ?? '';
        document.getElementById('patientAffectedPart').value       = p.affected_body_part ?? '';
        document.getElementById('patientDoctor').value             = p.doctor_name        ?? '';
        document.getElementById('patientTherapist').value          = p.therapist_name     ?? '';
        document.getElementById('patientPhone').value              = p.phone              ?? '';
        document.getElementById('patientEmail').value              = p.email              ?? '';
        document.getElementById('patientMedicalHistory').value     = p.medical_history    ?? '';
        document.getElementById('patientPrevInjury').value         = p.previous_injury    ?? '';
        document.getElementById('patientCurrTreatment').value      = p.current_treatment  ?? '';
        document.getElementById('patientExercisePlan').value       = p.exercise_plan      ?? '';

        document.getElementById('photoPreview').innerHTML = p.photo
            ? `<img src="data:image/jpeg;base64,${p.photo}"
                    style="width:80px;height:80px;border-radius:50%;object-fit:cover">`
            : '';

        document.getElementById('patientModal').classList.add('active');
    } catch(e) {
        console.error('editPatient:', e);
        showToast('Error loading patient data', 'error');
    }
}

// ─── Save (create / update) ───────────────────────────────────────────────
document.getElementById('patientForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const pid      = document.getElementById('patientId').value;
    const btn      = document.getElementById('saveBtn');
    const formData = new FormData(this);

    btn.disabled  = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

    try {
        const url    = pid ? `/api/patients/${pid}` : '/api/patients';
        const method = pid ? 'PUT' : 'POST';
        const res    = await fetch(url, { method, body: formData });
        const result = await res.json();

        if (res.ok) {
            showToast(result.message || 'Patient saved successfully', 'success');
            closePatientModal();
            // ✅ reload with current search term
            await loadPatients(document.getElementById('patientSearch').value.trim());
        } else {
            showToast(result.detail || 'Error saving patient', 'error');
        }
    } catch(e) {
        console.error('savePatient:', e);
        showToast('Error saving patient', 'error');
    } finally {
        btn.disabled  = false;
        btn.innerHTML = '<i class="fas fa-save"></i> Save Patient';
    }
});

// ─── View ─────────────────────────────────────────────────────────────────
async function viewPatient(pid) {
    document.getElementById('viewPatientModal').classList.add('active');
    document.getElementById('patientDetails').innerHTML =
        '<div class="loading-placeholder"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';

    try {
        const p        = await (await fetch(`/api/patients/${pid}`)).json();
        const sessions = p.sessions || [];
        const avgAcc   = sessions.length
            ? (sessions.reduce((s, x) => s + x.accuracy, 0) / sessions.length).toFixed(1) : 0;
        const avgRom   = sessions.length
            ? (sessions.reduce((s, x) => s + x.rom,      0) / sessions.length).toFixed(1) : 0;

        document.getElementById('patientDetails').innerHTML = `
        <div class="patient-profile">
            <div class="profile-header">
                <div class="profile-avatar">
                    ${p.photo
                        ? `<img src="data:image/jpeg;base64,${p.photo}" alt="${p.name}">`
                        : `<span>${p.name.charAt(0).toUpperCase()}</span>`}
                </div>
                <div class="profile-info">
                    <h4>${p.name}</h4>
                    <p style="color:#888;font-size:.85rem">ID: ${p.id}</p>
                    <p>${p.age} yrs · ${p.gender}</p>
                    <div style="display:flex;gap:.5rem;margin-top:.5rem;flex-wrap:wrap">
                        <span class="metric-badge" style="background:#4CAF5020;color:#4CAF50">
                            <i class="fas fa-bullseye"></i> ${avgAcc}% Accuracy
                        </span>
                        <span class="metric-badge" style="background:#2196F320;color:#2196F3">
                            <i class="fas fa-arrows-alt-h"></i> ${avgRom}° ROM
                        </span>
                    </div>
                </div>
            </div>

            <div class="profile-details">
                ${[
                    ['Diagnosis',         p.diagnosis],
                    ['Affected Area',     p.affected_body_part],
                    ['Doctor',            p.doctor_name],
                    ['Therapist',         p.therapist_name],
                    ['Phone',             p.phone],
                    ['Email',             p.email],
                    ['Weight / Height',   p.weight && p.height ? `${p.weight} kg / ${p.height} cm` : null],
                    ['Medical History',   p.medical_history],
                    ['Previous Injury',   p.previous_injury],
                    ['Current Treatment', p.current_treatment],
                    ['Exercise Plan',     p.exercise_plan],
                    ['Total Sessions',    sessions.length],
                    ['Registered',        new Date(p.date_created).toLocaleDateString()],
                ].map(([label, val]) => `
                    <div class="detail-row">
                        <span class="detail-label">${label}:</span>
                        <span class="detail-value">${val || '—'}</span>
                    </div>`).join('')}
            </div>

            ${sessions.length ? `
            <div class="recent-sessions">
                <h5>Recent Sessions (${sessions.length} total)</h5>
                ${sessions.slice(0, 5).map(s => {
                    const col = s.accuracy >= 80 ? '#4CAF50' : s.accuracy >= 60 ? '#FF9800' : '#f44336';
                    return `
                    <div class="session-item">
                        <span class="session-exercise">${s.exercise_type}</span>
                        <span class="session-date">${s.date}</span>
                        <span style="color:${col};font-weight:600">${s.accuracy.toFixed(1)}%</span>
                        <span style="color:#2196F3">${s.rom.toFixed(1)}°</span>
                        <span>${s.completed_reps} reps</span>
                    </div>`;
                }).join('')}
            </div>` : `
            <div class="activity-empty" style="margin-top:1rem">
                <i class="fas fa-calendar-times"></i>
                <span>No sessions yet</span>
            </div>`}

            <div class="modal-footer" style="margin-top:1rem">
                <button class="btn-secondary" onclick="closeViewPatientModal()">Close</button>
                <button class="btn-primary"
                        onclick="closeViewPatientModal(); editPatient('${p.id}')">
                    <i class="fas fa-edit"></i> Edit
                </button>
                <button class="btn-primary"
                        onclick="generateReport('${p.id}','${p.name.replace(/'/g,"\\'")}')">
                    <i class="fas fa-file-pdf"></i> Report
                </button>
            </div>
        </div>`;
    } catch(e) {
        console.error('viewPatient:', e);
        document.getElementById('patientDetails').innerHTML =
            '<p style="color:red;padding:1rem">Failed to load patient details.</p>';
    }
}

function closeViewPatientModal() {
    document.getElementById('viewPatientModal').classList.remove('active');
}

// ─── Delete ✅ FIXED ──────────────────────────────────────────────────────
async function deletePatient(pid, name) {
    if (!confirm(`Delete patient "${name}"? This cannot be undone.`)) return;

    try {
        const res    = await fetch(`/api/patients/${pid}`, { method: 'DELETE' });
        const result = await res.json();

        if (res.ok) {
            showToast(`${name} removed successfully`, 'success');

            // ✅ Smooth fade-out then remove card from DOM
            const card = document.querySelector(`[data-patient-id="${pid}"]`);
            if (card) {
                card.classList.add('removing');
                setTimeout(() => {
                    card.remove();
                    // Update summary count after card removed
                    const remaining = document.querySelectorAll('[data-patient-id]').length;
                    if (remaining === 0) {
                        // No cards left — reload to show empty state
                        loadPatients();
                    } else {
                        const sumText = document.getElementById('summaryText');
                        if (sumText) {
                            const active = document.querySelectorAll('.status-badge.active').length;
                            sumText.textContent =
                                `${remaining} patient${remaining !== 1 ? 's' : ''} found · ${active} active`;
                        }
                    }
                }, 300);
            } else {
                // Fallback — just reload
                await loadPatients();
            }
        } else {
            showToast(result.detail || 'Error deleting patient', 'error');
        }
    } catch(e) {
        console.error('deletePatient:', e);
        showToast('Error deleting patient', 'error');
    }
}

// ─── Report ───────────────────────────────────────────────────────────────
function generateReport(pid, name) {
    showToast(`Generating report for ${name || 'patient'}...`, 'success');
    window.open(`/api/reports/${pid}?report_type=weekly`, '_blank');
}

// ─── Misc ─────────────────────────────────────────────────────────────────
function handleLogout() {
    if (confirm('Are you sure you want to logout?')) window.location.href = '/';
}

function showToast(message, type = 'success', duration = 3000) {
    document.querySelectorAll('.toast').forEach(t => t.remove());
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `
        <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
        <span>${message}</span>`;
    document.body.appendChild(toast);
    requestAnimationFrame(() => toast.classList.add('show'));
    setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
    }, duration);
}
</script>
